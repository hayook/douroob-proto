<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Douroob Social</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- App Header -->
    <header id="app-header" style="display: none;">
        <div class="nav-container">
            <h2 style="color: #3b82f6;">Douroob</h2>
            <div id="status" style="font-size: 0.8rem; color: #666;">Authenticated</div>
        </div>
    </header>

    <div id="app">
        <!-- Auth Views -->
        <div id="auth-views" class="auth-wrapper">
            <h1 style="text-align: center; margin-bottom: 2rem;">Douroob Social</h1>
            
            <!-- Login -->
            <div id="login-view" class="card">
                <h3>Login</h3>
                <div class="form-group">
                    <input type="email" id="login-email" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Password">
                </div>
                <button id="btn-login-submit" style="width: 100%;">Sign In</button>
                <span class="toggle-link" id="go-to-register">New here? Create an account</span>
            </div>

            <!-- Register -->
            <div id="register-view" class="card" style="display: none;">
                <h3>Register</h3>
                <div class="form-group">
                    <input type="email" id="register-email" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" placeholder="Password">
                </div>
                <button id="btn-register-submit" style="width: 100%;">Join Douroob</button>
                <span class="toggle-link" id="go-to-login">Already have an account? Login</span>
            </div>
        </div>

        <!-- Home Page View -->
        <div id="user-info" class="main-layout" style="display: none;">
            
            <!-- Left Sidebar: Profile -->
            <aside class="sidebar-left">
                <div class="card profile-summary">
                    <div class="avatar-placeholder" style="width: 80px; height: 80px; margin: 0 auto 1rem;"></div>
                    <strong id="profile-name">...</strong>
                    <small id="profile-username">...</small>
                    <button id="btn-logout">Sign Out</button>
                </div>
                <div class="card">
                    <p style="color: #666; font-size: 0.9rem;">Home</p>
                    <p style="color: #666; font-size: 0.9rem; margin-top: 0.5rem;">Explore</p>
                    <p style="color: #666; font-size: 0.9rem; margin-top: 0.5rem;">Notifications</p>
                </div>
            </aside>

            <!-- Center: Feed -->
            <main class="feed-view">
                <div class="card">
                    <h3>Home Feed</h3>
                    <div class="feed-placeholder">
                        <p>Your feed is empty.</p>
                        <small>Follow some users to see their posts here.</small>
                    </div>
                </div>
            </main>

            <!-- Right Sidebar: Discovery -->
            <aside class="sidebar-right">
                <div class="card">
                    <h3>Who to follow</h3>
                    <div id="profiles-list">
                        <p style="color: #666;">Finding users...</p>
                    </div>
                </div>
            </aside>

        </div>

        <!-- Global Toast/Output -->
        <div id="output" style="display: none;"></div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
